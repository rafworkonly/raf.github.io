{% assign menu = site.data.menu %}
{% if menu %}
  <nav class="site-navigation" role="navigation">
    <ul>
      <li>
        <a href="{{ '/' | prepend: site.baseurl }}">
          Home
        </a>
      </li>
    {% for item in site.data.menu %}
      <li {% if page.url == item.url %}class="active"{% endif %}>
        {% if item.url contains 'http' %}
          <a href="{{ item.url }}">
            {{ item.title }}
          </a>
        {% else %}
          <a href="{{ item.url | prepend: site.baseurl }}">
            {{ item.title }}
          </a>
        {% endif %}
      </li>
    {% endfor %}
      <li class="lang-toggle">
      <button id="btn-en" class="lang-btn active" onclick="filterLang('en')" title="Not a translation! Each language has its own content!&#10;翻訳ではありません！言語ごとに内容が違います！">EN</button>
<button id="btn-ja" class="lang-btn" onclick="filterLang('ja')" title="Not a translation! Each language has its own content!&#10;翻訳ではありません！言語ごとに内容が違います！">日本語</button>
      </li>
    </ul>
  </nav>
{% endif %}
